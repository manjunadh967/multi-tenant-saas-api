name: Django CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:

  test:

    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16

        env:
          POSTGRES_DB: saas_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: manju

        ports:
          - 5432:5432

        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SECRET_KEY: this-is-a-very-long-secret-key-for-testing-only-123456
      DEBUG: True
      DB_NAME: saas_db
      DB_USER: postgres
      DB_PASSWORD: manju
      DB_HOST: localhost
      DB_PORT: 5432


    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Django Checks
        run: |
          python manage.py check

      - name: Run Tests
        run: |
          python manage.py test

      - name: Build Docker Image
        run: |
          docker build -t multi-tenant-saas-api .